version: "3.8"

services:
  api-backend:
    image: node:18-alpine
    container_name: mi_backend_autosys
    working_dir: /app
    restart: always
    volumes:
      # 👇 REEMPLAZAMOS EL PUNTO POR ${PWD} 👇
      - ${PWD}/backend:/app
    command: sh -c "npm install && npm start"
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}

  web-frontend:
    image: node:18-alpine
    container_name: mi_frontend_autosys
    working_dir: /app
    restart: always
    volumes:
      # 👇 REEMPLAZAMOS EL PUNTO POR ${PWD} 👇
      - ${PWD}/frontend:/app
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3005:3000"
    depends_on:
      - api-backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
